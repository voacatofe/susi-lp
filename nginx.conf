server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_proxied any;
    gzip_min_length 1000;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://tagmanager.google.com https://*.tagmanager.google.com; font-src 'self' https://fonts.gstatic.com https://*.gstatic.com; img-src 'self' data: https://www.googletagmanager.com https://*.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://ssl.gstatic.com https://www.gstatic.com https://*.gstatic.com https://www.google.com https://*.google.com https://*.susialves.com.br https://kfpkomgz.sal.stape.io https://*.stape.io https://www.facebook.com https://facebook.com; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://*.googletagmanager.com https://tagassistant.google.com https://tagmanager.google.com https://*.tagmanager.google.com https://*.susialves.com.br https://kfpkomgz.sal.stape.io https://*.stape.io https://connect.facebook.net https://static.cloudflareinsights.com; frame-src 'self' https://www.googletagmanager.com https://*.googletagmanager.com https://tagassistant.google.com https://tagmanager.google.com https://*.tagmanager.google.com https://*.susialves.com.br https://kfpkomgz.sal.stape.io https://*.stape.io https://www.facebook.com https://facebook.com; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net https://www.googletagmanager.com https://*.googletagmanager.com https://tagassistant.google.com https://tagmanager.google.com https://*.tagmanager.google.com https://www.google.com https://*.google.com https://*.susialves.com.br https://kfpkomgz.sal.stape.io https://*.stape.io https://www.facebook.com https://facebook.com https://cloudflareinsights.com https://*.cloudflareinsights.com;" always;

    # Cache Control for static assets (images, CSS, fonts)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Main index routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Error handling
    error_page 404 /index.html;
}
